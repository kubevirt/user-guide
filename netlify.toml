[build]
  publish = "./site"
  command = """
pip install --upgrade pip;
pip install mkdocs mkdocs-awesome-nav mkdocs-material mkdocs-redirects mkdocs-static-i18n;
rm -rf /opt/build/repo/docs/es /opt/build/repo/docs/zh;
mkdir -p /opt/build/repo/docs/en;
find /opt/build/repo/docs/ -mindepth 1 -maxdepth 1 ! -name 'assets' ! -name '_redirects' ! -name 'stylesheets' ! -name 'en' ! -name '.nav.yml' -print0 | xargs -0 -r mv -t /opt/build/repo/docs/en/;
cp /opt/build/repo/docs/en/index.md /opt/build/repo/docs/en/welcome.md;
cp -r /opt/build/repo/docs/.nav.yml /opt/build/repo/docs/en/;
cp -r /opt/build/repo/i18n/* /opt/build/repo/docs/.;
sed -i 's|site_url: https://kubevirt.io/docs|site_url: https://kubevirt.io/|' /opt/build/repo/mkdocs.yml;
sed -i 's/docs_dir: docs/docs_dir:/' /opt/build/repo/mkdocs.yml;
echo '*** BEGIN /opt/build/repo/mkdocs.yml ***';
cat /opt/build/repo/mkdocs.yml;
echo '*** END /opt/build/repo/mkdocs.yml ***';
python -m mkdocs build -f /opt/build/repo/mkdocs.yml -d /opt/build/repo/site
"""
